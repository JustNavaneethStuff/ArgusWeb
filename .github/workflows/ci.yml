name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check packages/ services/ tests/

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit/ -v --cov=argus_core --cov=argus_events --cov-report=term-missing

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --all-packages
      - name: Dependency audit
        run: uv pip install pip-audit && uv run pip-audit

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t argus:test .
